<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canh thời gian T1</title>
    <link rel="stylesheet" href="style.css?v=32">
</head>
<body>
    <button type="button" class="sync-btn" id="btn-sync">
        <span class="sync-icon">⏱️</span> Sync: <b id="sync-status" style="color: #ef4444;">OFF</b>
    </button>

    <input type="text" class="name-input" id="my-name-input" placeholder="Tên của bạn..." maxlength="15">

    <button type="button" class="theme-btn" id="btn-theme">
        <span class="theme-icon" id="theme-icon">🌙</span> <b id="theme-text">Dark</b>
    </button>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-confirm">
            <p class="modal-text">Bạn có chắc chắn?</p>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="confirmCancelBtn">Huỷ</button>
                <button type="button" class="modal-btn modal-btn-ok" id="confirmOkBtn">OK</button>
            </div>
        </div>
    </div>

    <div class="app-card">
        <div class="user-profile">
            <b id="usernameDisplay">@user</b>
        </div>

        <div class="stats-row">
            <div class="stat-badge badge-yellow">
                🪙 <span id="viewCount">0</span>/<span id="peopleCount">0</span>
            </div>
            <div class="stat-badge badge-gray" id="hotBoxFlag">🏅🇩🇪</div>
            <div class="stat-badge badge-blue">
                👀 <span id="viewersDisplay">0</span>
            </div>
        </div>

        <div class="countdown-wrapper">
            <div class="cd" id="countdown">00.0</div>
            
            <div class="info-row">
                <div class="ping-info" id="pingDisplay">Ping mạng: --</div>
                <div class="time-info" id="endTimeDisplay">--:--:--</div>
            </div>

        </div>

        <div class="controls-panel">
            <button type="button" class="db btn-red" id="btn-decrease-0.05">-0.05</button>
            <button type="button" class="db btn-red" id="btn-decrease-0.01">-0.01</button>
            
            <div class="offset-display">
                <span class="d-t" id="d-t"><b>+0.00s</b></span>
            </div>

            <button type="button" class="db btn-green" id="btn-increase-0.01">+0.01</button>
            <button type="button" class="db btn-green" id="btn-increase-0.05">+0.05</button>
        </div>

        <div class="action-buttons">
            <button type="button" class="cb main-btn" id="claimBtn">COPY LINK</button>
            <button type="button" class="cb square-btn" id="claimChangeBtn">+</button>
        </div>

        <div class="active-viewers-box">
            <span style="font-size: 1.1rem;">🔥</span> <span id="viewers-list">Đang kết nối phòng xem...</span>
        </div>

        <button type="button" class="color-btn" id="btn-open">🎨 Canh theo màu sắc</button>

        <div class="active-config" id="activeConfigDisplay" style="display: none;">
            <div class="config-color-dot" id="configColorDot"></div>
            <span class="config-text" id="configText">Từ 0.0s đến 0.0s</span>
            <button type="button" class="config-del-btn" id="configDelBtn">✖</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">Cấu hình nháy màu</div>
            <div class="form-group">
                <label for="start_seconds">Thời gian bắt đầu nháy (s):</label>
                <input type="number" id="start_seconds" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="end_seconds">Thời gian kết thúc nháy (s):</label>
                <input type="number" id="end_seconds" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="hex_background_color">Chọn màu:</label>
                <input type="color" id="hex_background_color" value="#ff0000" class="color-input">
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn mbc" id="btn-cancel">Hủy</button>
                <button type="button" class="modal-btn mbs" id="btn-submit">Lưu cấu hình</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=41"></script>
</body>
</html>
