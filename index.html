<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Canh thời gian T1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Modal xác nhận -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-confirm">
            <p class="modal-text">Bạn có chắc chắn?</p>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="confirmCancelBtn">Huỷ</button>
                <button type="button" class="modal-btn modal-btn-ok" id="confirmOkBtn">OK</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Tên người dùng -->
        <div class="usf">
            <b>@reg*napromos1</b>
        </div>

        <!-- Thống kê -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-icon">️</span>
                <span id="viewCount">80</span>/<span id="peopleCount">25</span>
                <span>🏅🇩🇪</span>
                <span class="time-now">&nbsp; - &nbsp;👀&nbsp;159</span>
            </div>
        </div>

        <!-- Điều chỉnh thời gian -->
        <div class="dc">
            <button type="button" class="db" id="btn-decrease-0.05">-0.05s</button>
            <button type="button" class="db" id="btn-decrease-0.01">-0.01s</button>
            <span class="d-t" id="d-t"><b>0.00s</b></span>
            <button type="button" class="db" id="btn-increase-0.01">+0.01s</button>
            <button type="button" class="db" id="btn-increase-0.05">+0.05s</button>
        </div>

        <!-- Thanh tiến trình -->
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <!-- Bộ đếm ngược -->
        <div class="cd" id="countdown">0</div>

        <!-- Thời gian hiện tại -->
        <div class="time-now" id="currentTime">20:35:47</div>

        <!-- Trạng thái -->
        <div class="sm success-message" id="status">🎉 Rương đã mở!</div>

        <!-- Các nút COPY và màu sắc -->
        <div>
            <button type="button" class="cb cb--icon" id="claimCopyBtn">?</button>
            <button type="button" class="cb" id="claimBtn">COPY</button>
            <button type="button" class="cb cb--icon cb--icon-right" id="claimChangeBtn">+</button>
        </div>

        <br>

        <!-- Ghi chú và nút mở cấu hình -->
        <div class="note-container">
            <span class="note"><b>- Bật tự động cập nhật thời gian</b></span>
            <span class="note"><b>- Dùng thiết bị mạnh</b></span>
            <span class="note"><b>- Đóng, xóa app không sử dụng</b></span>
            <button type="button" class="config-btn" id="btn-open">Màu sắc</button>
        </div>
    </div>

    <!-- Modal cấu hình màu nền -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">Cấu hình màu nền</div>
            <div class="form-group">
                <label for="start_seconds">Thời gian bắt đầu (s):</label>
                <input type="number" id="start_seconds" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="end_seconds">Thời gian kết thúc (s):</label>
                <input type="number" id="end_seconds" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="hex_background_color">Màu nền:</label>
                <input type="color" id="hex_background_color" value="#ff0000" class="color-input">
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn mbc" id="btn-cancel">Hủy</button>
                <button type="button" class="modal-btn mbs" id="btn-submit">Lưu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
