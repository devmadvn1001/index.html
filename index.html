<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>LẤY LINK LIVE</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; font-family: Arial; }
        #copy-btn { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <button id="copy-btn">BẤM ĐỂ LẤY LINK LIVE</button>
    <p id="msg"></p>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const link = urlParams.get('link');
        document.getElementById('copy-btn').onclick = () => {
            if (link) {
                navigator.clipboard.writeText(link);
                document.getElementById('msg').innerText = "Đã Copy link thành công!";
                alert("Link đã được copy, dán vào TikTok ngay!");
            }
        };
    </script>
</body>
</html>
