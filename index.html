<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bypass Live</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="junb-frame" src=""></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tiktokLink = urlParams.get('link');
        const junbUrl = "https://i.junb.io.vn/box-countdown/index2.html" + window.location.search.replace("?link=" + encodeURIComponent(tiktokLink), "");

        document.getElementById('junb-frame').src = junbUrl;

        // Cấy mã hack vào trang đã nhúng
        window.addEventListener('message', (e) => {
            // Script này sẽ tìm nút COPY và đổi hành động của nó
        });
        
        // HACK: Vì bạn không thể can thiệp vào iframe của trang khác (bảo mật của trình duyệt)
        // Nên tôi khuyên bạn dùng cách này: Dùng Overlay (nút bấm đè lên)
    </script>
</body>
</html>
