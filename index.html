<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canh thời gian T1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button type="button" class="settings-btn" id="btn-open-settings">Cài đặt</button>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-confirm">
            <p class="modal-text">Bạn có chắc chắn?</p>
            <div class="modal-actions">
                <button type="button" class="modal-btn modal-btn-cancel" id="confirmCancelBtn">Huỷ</button>
                <button type="button" class="modal-btn modal-btn-ok" id="confirmOkBtn">OK</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="usf">
            <b id="usernameDisplay">@user</b>
        </div>

        <div class="stats">
            <span id="viewCount">1000</span>/<span id="peopleCount">500</span>
            <span class="divider">—</span>
            <span id="hotBoxFlag">🔥🏅TH</span>
            <span class="divider">—</span>
            <span>👀 <span id="viewersDisplay">2001</span></span>
        </div>

        <div class="cd" id="countdown">0.0</div>

        <div class="time-info">
            <div id="endTimeDisplay">--:--:--</div>
            <div class="ping-info">Ping 0.002s (syncing - ✅ internet tốt)</div>
        </div>

        <div class="dc">
            <button type="button" class="db btn-red" id="btn-decrease-0.01">-0.01</button>
            <button type="button" class="db btn-red" id="btn-decrease-0.05">-0.05</button>
            <span class="d-t" id="d-t"><b>0.00s</b></span>
            <button type="button" class="db btn-green" id="btn-increase-0.05">+0.05</button>
            <button type="button" class="db btn-green" id="btn-increase-0.01">+0.01</button>
        </div>

        <div class="action-buttons">
            <button type="button" class="cb main-btn" id="claimBtn">COPY</button>
            <button type="button" class="cb square-btn" id="claimChangeBtn">+</button>
        </div>

        <div class="bottom-action">
            <button type="button" class="color-btn" id="btn-open">Canh theo màu sắc</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title">Cấu hình màu nền</div>
            <div class="form-group">
                <label for="start_seconds">Thời gian bắt đầu (s):</label>
                <input type="number" id="start_seconds" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="end_seconds">Thời gian kết thúc (s):</label>
                <input type="number" id="end_seconds" step="0.1" min="0">
            </div>
            <div class="form-group">
                <label for="hex_background_color">Màu nền:</label>
                <input type="color" id="hex_background_color" value="#ff0000" class="color-input">
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-btn mbc" id="btn-cancel">Hủy</button>
                <button type="button" class="modal-btn mbs" id="btn-submit">Lưu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
